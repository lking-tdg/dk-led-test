<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VisionEdge Scroll Test</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 8000px;
    height: 80px;
    background: black;
    overflow: hidden;
  }

  #track {
    position: absolute;
    left: 0;
    top: 10px;
    white-space: nowrap;
    color: #00ff9c;
    font-family: Arial, sans-serif;
    font-size: 60px;
    will-change: transform;
  }
</style>
</head>

<body>
  <div id="track">
    ✅ VISIONEDGE SCROLL TEST — THIS TEXT SHOULD MOVE LEFT CONTINUOUSLY
  </div>

<script>
  let x = 0;
  const el = document.getElementById("track");

  function animate() {
    x -= 1;
    el.style.transform = "translateX(" + x + "px)";
    requestAnimationFrame(animate);
  }

  animate();
</script>
</body>
</html>
