<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>DraftKings NHL Moneyline Ticker</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 8000px;
    height: 80px;
    background: #000;
    overflow: hidden;
  }

  #canvas {
    width: 8000px;
    height: 80px;
    display: flex;
    align-items: center;
    overflow: hidden;
  }

  #track {
    display: inline-flex;
    align-items: center;
    white-space: nowrap;
    gap: 96px;
    font-family: Arial, sans-serif;
    will-change: transform;
  }

  .team {
    height: 48px;
    margin: 0 10px;
    vertical-align: middle;
  }

  .vs {
    font-size: 48px;
    color: #fff;
    margin: 0 14px;
  }

  .odds {
    font-size: 64px;
    color: #00ff9c;
    margin-left: 24px;
  }

  .dk-separator {
    height: 34px;
    margin: 0 32px;
    vertical-align: middle;
  }

  .compliance {
    font-size: 42px;
    color: #fff;
    margin-left: 32px;
    letter-spacing: 1.5px;
  }
</style>
</head>

<body>
<div id="canvas">
  <div id="track"></div>
</div>

<script>
/* =============================
   DRAFTKINGS PROVIDED DATA
   ============================= */

const DK_DATA = /* PASTE THE CONTENTS OF NHL_DK_test.json HERE */
{
  /* exactly paste the JSON object contents here */
};

/* =============================
   CONFIG
   ============================= */

const SCROLL_SPEED = 120;
const track = document.getElementById("track");

/* Team → logo mapping */
const LOGOS = {
  "EDM Oilers": "logos/EDM.png",
  "ANA Ducks": "logos/ANA.png",
  "NY Islanders": "logos/NYI.png",
  "FLA Panthers": "logos/FLA.png",
  "DAL Stars": "logos/DAL.png",
  "PIT Penguins": "logos/PIT.png",
  "BOS Bruins": "logos/BOS.png",
  "MIN Wild": "logos/MIN.png"
};

/* =============================
   BUILD TICKER
   ============================= */

let x = 0;
let last = performance.now();
let contentWidth = 0;

buildTicker(DK_DATA);

function buildTicker(data) {
  const items = [];
  const events = data.events.slice(0, 6);

  events.forEach(event => {
    const home = event.participants.find(p => p.venueRole === "Home");
    const away = event.participants.find(p => p.venueRole === "Away");

    const market = data.markets.find(
      m => m.eventId === event.id && m.marketType.name === "Moneyline"
    );
    if (!market) return;

    const selections = data.selections.filter(s => s.marketId === market.id);
    const homeML = selections.find(s => s.outcomeType === "Home");
    const awayML = selections.find(s => s.outcomeType === "Away");

    if (!homeML || !awayML) return;

    items.push(`
      ${LOGOS[away.name] ? `${LOGOS[away.name]}` : away.name}
      <span class="vs">@</span>
      ${LOGOS[home.name] ? `<img src="${LOGOS[home.name]}" class="teampan class="odds">ML: ${awayML.displayOdds.american} / ${homeML.displayOdds.american}</span>
    `);
  });

  const sep = `<img src="OSB_LinearullColor_OnDark.png`;
  const compliance = `<span class="compliance">ODDS SUBJECT TO CHANGE. ELIGIBILITY RESTRICTIONS APPLY.</span>`;

  const html = `${sep}${items.join(sep)}${sep}${compliance}`;
  track.innerHTML = `<span>${html}</span><span>${html}</span>`;

  requestAnimationFrame(() => {
    contentWidth = track.scrollWidth / 2;
    requestAnimationFrame(animate);
  });
}

function animate(now) {
  const dt = (now - last) / 1000;
  last = now;
  x -= SCROLL_SPEED * dt;
  if (Math.abs(x) >= contentWidth) x = 0;
  track.style.transform = `translateX(${x}px)`;
  requestAnimationFrame(animate);
}
</script>
</body>
</html>
