<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VisionEdge DK Static Odds Test</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 8000px;
    height: 80px;
    background: black;
    overflow: hidden;
  }

  #canvas {
    width: 8000px;
    height: 80px;
    display: flex;
    align-items: center;
    overflow: hidden;
  }

  #track {
    display: inline-flex;
    align-items: center;
    white-space: nowrap;
    font-family: Arial, sans-serif;
    font-size: 60px;
    color: #00ff9c;
    will-change: transform;
  }

  .block {
    margin-right: 80px;
  }

  .dk {
    height: 34px;
    margin: 0 32px;
    vertical-align: middle;
  }

  .vs {
    margin: 0 12px;
    color: #ffffff;
  }
</style>
</head>

<body>
<div id="canvas">
  <div id="track">
    <div class="block">
      ANA DUCKS <span class="vs">@</span> EDM OILERS &nbsp; ML +160 / -192
      <img src="OSB_Linear_21+Logo_FullColor_OnDark.png" class="dk">
      FLA PANTHERS <span class="vs">@</span> NY ISLANDERS &nbsp; ML -170 / +142
      <img src="OSB_Linear_21+Logo_FullColor_OnDark.png" class="dk">
      DAL STARS <span class="vs">@</span> PIT PENGUINS &nbsp; ML +210 / -258
    </div>
    <div class="block">
      ANA DUCKS <span class="vs">@</span> EDM OILERS &nbsp; ML +160 / -192
      <img src="OSB_Linear_21+Logo_FullColor_OnDark.png" class="dk">
      FLA PANTHERS <span class="vs">@</span> NY ISLANDERS &nbsp; ML -170 / +142
      <img src="OSB_Linear_21+Logo_FullColor_OnDark.png" class="dk">
      DAL STARS <span class="vs">@</span> PIT PENGUINS &nbsp; ML +210 / -258
    </div>
  </div>
</div>

<script>
  let x = 0;
  let last = performance.now();
  let width = 0;
  const SPEED = 120;

  const track = document.getElementById("track");

  requestAnimationFrame(() => {
    width = track.scrollWidth / 2;
    requestAnimationFrame(tick);
  });

  function tick(now) {
    const dt = (now - last) / 1000;
    last = now;

    x -= SPEED * dt;
    if (Math.abs(x) >= width) x = 0;

    track.style.transform = "translateX(" + x + "px)";
    requestAnimationFrame(tick);
  }
</script>
</body>
</html>
