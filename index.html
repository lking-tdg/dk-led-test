<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>DraftKings NHL Odds Ticker</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 8000px;
    height: 80px;
    background: #000;
    overflow: hidden;
  }

  #canvas {
    width: 8000px;
    height: 80px;
    display: flex;
    align-items: center;
    overflow: hidden;
  }

  #track {
    display: inline-flex;
    align-items: center;
    white-space: nowrap;
    gap: 96px;
    font-family: Arial, sans-serif;
    will-change: transform;
  }

  /* ===== Team logos ===== */
  .team {
    height: 48px;
    width: auto;
    margin: 0 8px;
    vertical-align: middle;
  }

  .vs {
    color: #ffffff;
    font-size: 48px;
    margin: 0 12px;
  }

  /* ===== Odds ===== */
  .odds {
    font-size: 64px;
    color: #00ff9c;
    margin-left: 24px;
  }

  /* ===== DraftKings linear separator ===== */
  .dk-separator {
    height: 34px;
    margin: 0 32px;
    vertical-align: middle;
  }

  /* ===== Compliance ===== */
  .compliance {
    font-size: 42px;
    color: #ffffff;
    letter-spacing: 1.5px;
    margin-left: 32px;
  }
</style>
</head>

<body>
<div id="canvas">
  <div id="track"></div>
</div>

<script>
  const SCROLL_SPEED = 120;

  const demoItems = [
    `
    <img src="nhl-edm.png" class="team</span>
    <img src="nhl-vgk.png" class="dds">ML: EDM +114  VGK −135</span>
    `,
    `
    <img src="nhl-edm.png class="vs">@</span>
    <img src="nhl-vgk.png class="odds">PL: VGK +1.5 (−225)  EDM −1.5 (+185)</span>
    `,
    `
    <img src="nhl-edm.png"class="vs">@</span>
    <img src="nhl-vgk.png" class"odds">O/U 6.5 (O −110  U −110)</span>
    `,
    `
    <img src="nhl-lakspan class="vs">@</span>
    <img src="nhl-van.png" class"odds">ML: LAK −175  VAN +145</span>
    `
  ];

  const track = document.getElementById("track");

  let x = 0;
  let last = performance.now();
  let contentWidth = 0;

  function buildTicker() {
    const separator = `
      <img src="OSB_Linear_21+Logo_FullColor_OnDark.png" classt compliance = `
      <span class="compliance">
        ODDS SUBJECT TO CHANGE. ELIGIBILITY RESTRICTIONS APPLY.
      </span>
    `;

    const blockHTML = `
      ${separator}
      ${demoItems.join(separator)}
      ${separator}
      ${compliance}
    `;

    track.innerHTML = `<span>${blockHTML}</span><span>${blockHTML}</span>`;

    requestAnimationFrame(() => {
      contentWidth = track.scrollWidth / 2;
    });
  }

  function animate(now) {
    const dt = (now - last) / 1000;
    last = now;

    x -= SCROLL_SPEED * dt;
    if (Math.abs(x) >= contentWidth) x = 0;

    track.style.transform = \`translateX(\${x}px)\`;
    requestAnimationFrame(animate);
  }

  buildTicker();
  requestAnimationFrame(animate);
</script>
</body>
</html>
