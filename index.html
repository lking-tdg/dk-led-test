<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>DraftKings NHL Moneyline Ticker</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 8000px;
    height: 80px;
    background: black;
    overflow: hidden;
  }

  #canvas {
    width: 8000px;
    height: 80px;
    display: flex;
    align-items: center;
    overflow: hidden;
  }

  #track {
    display: inline-flex;
    align-items: center;
    white-space: nowrap;
    font-family: Arial, sans-serif;
    font-size: 60px;
    color: #00ff9c;
    will-change: transform;
  }

  .block {
    margin-right: 80px;
  }

  .dk {
    height: 34px;
    margin: 0 32px;
    vertical-align: middle;
  }

  .vs {
    color: #ffffff;
    margin: 0 12px;
  }

  .odds {
    margin-left: 18px;
  }

  .compliance {
    font-size: 42px;
    color: #ffffff;
    margin-left: 32px;
    letter-spacing: 1.5px;
  }
</style>
</head>

<body>
<div id="canvas">
  <div id="track"></div>
</div>

<script>
/* =========================================
   DRAFTKINGS MONEYLINE DATA (FROM JSON)
   ========================================= */

const DK_MONEYLINE = [
  {
    away: "ANA DUCKS",
    home: "EDM OILERS",
    awayML: "+160",
    homeML: "-192"
  },
  {
    away: "FLA PANTHERS",
    home: "NY ISLANDERS",
    awayML: "-170",
    homeML: "+142"
  },
  {
    away: "DAL STARS",
    home: "PIT PENGUINS",
    awayML: "+210",
    homeML: "-258"
  }
];

/* =========================================
   TICKER ENGINE (PROVEN SAFE)
   ========================================= */

const track = document.getElementById("track");
const SPEED = 120;
let x = 0;
let last = performance.now();
let width = 0;

buildTicker();

function buildTicker() {
  const items = DK_MONEYLINE.map(g =>
    `${g.away} <span class="vs">@</span> ${g.home}
     <span class="odds">ML ${g.awayML} / ${g.homeML}</span>`
  );

  const sep = `<img src="OSB_Linear_21+Logo_FullColor_On
  const legal = `<span class="compliance">ODDS SUBJECT TO CHANGE. ELIGIBILITY RESTRICTIONS APPLY.</span>`;

  const html = sep + items.join(sep) + sep + legal;

  track.innerHTML = `<span class="block">${html}</span><span class="block">${html}</span>`;

  requestAnimationFrame(() => {
    width = track.scrollWidth / 2;
    requestAnimationFrame(tick);
  });
}

function tick(now) {
  const dt = (now - last) / 1000;
  last = now;

  x -= SPEED * dt;
  if (Math.abs(x) >= width) x = 0;

  track.style.transform = `translateX(${x}px)`;
  requestAnimationFrame(tick);
}
</script>
</body>
</html>
