<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VisionEdge Loop Test</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 8000px;
    height: 80px;
    background: black;
    overflow: hidden;
  }

  #canvas {
    width: 8000px;
    height: 80px;
    overflow: hidden;
    display: flex;
    align-items: center;
  }

  #track {
    display: inline-flex;
    white-space: nowrap;
    font-family: Arial, sans-serif;
    font-size: 60px;
    color: #00ff9c;
    will-change: transform;
  }

  .block {
    margin-right: 80px;
  }
</style>
</head>

<body>
<div id="canvas">
  <div id="track">
    <div class="block">
      VISIONEDGE LOOP TEST — NHL ODDS TICKER MOTION VERIFIED
    </div>
    <div class="block">
      VISIONEDGE LOOP TEST — NHL ODDS TICKER MOTION VERIFIED
    </div>
  </div>
</div>

<script>
  let x = 0;
  let last = performance.now();
  let width = 0;

  const track = document.getElementById("track");

  requestAnimationFrame(() => {
    width = track.scrollWidth / 2;
    requestAnimationFrame(tick);
  });

  function tick(now) {
    const dt = (now - last) / 1000;
    last = now;

    x -= 120 * dt; // scroll speed
    if (Math.abs(x) >= width) x = 0;

    track.style.transform = "translateX(" + x + "px)";
    requestAnimationFrame(tick);
  }
</script>
</body>
</html>
