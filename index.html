<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>DraftKings NHL Ticker</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 8000px;
    height: 80px;
    background: black;
    overflow: hidden;
  }

  #canvas {
    width: 8000px;
    height: 80px;
    display: flex;
    align-items: center;
    overflow: hidden;
  }

  #track {
    display: inline-flex;
    align-items: center;
    white-space: nowrap;
    font-family: Arial, sans-serif;
    font-size: 60px;
    color: #00ff9c;
    will-change: transform;
  }

  .block {
    margin-right: 80px;
  }

  .dk {
    height: 34px;
    margin: 0 32px;
    vertical-align: middle;
  }

  .vs {
    color: #ffffff;
    margin: 0 12px;
  }

  .odds {
    margin-left: 18px;
  }

  .compliance {
    font-size: 42px;
    color: #ffffff;
    margin-left: 32px;
    letter-spacing: 1.5px;
  }
</style>
</head>

<body>
<div id="canvas">
  <div id="track"></div>
</div>

<script>
/* -----------------------------
   GAME DATA (FROM DK JSON)
------------------------------ */

var GAMES = [
  {
    away: "ANA DUCKS",
    home: "EDM OILERS",
    moneyline: "ML +160 / -192",
    puckline: "PL +1.5 -350 | -1.5 +275",
    total: "O/U 6.5 O -110 / U -110"
  },
  {
    away: "FLA PANTHERS",
    home: "NY ISLANDERS",
    moneyline: "ML -170 / +142",
    puckline: "PL +1.5 -200 | -1.5 +165",
    total: "O/U 5.5 O -105 / U -115"
  },
  {
    away: "DAL STARS",
    home: "PIT PENGUINS",
    moneyline: "ML +210 / -258",
    puckline: "PL +1.5 -135 | -1.5 +115",
    total: "O/U 6.0 O -108 / U -112"
  }
];

/* -----------------------------
   MARKET ROTATION
------------------------------ */

var MARKETS = ["moneyline", "puckline", "total"];
var marketIndex = 0;

/* -----------------------------
   TICKER ENGINE (PROVEN SAFE)
------------------------------ */

var track = document.getElementById("track");
var SPEED = 120;
var x = 0;
var width = 0;
var last = performance.now();

buildTicker();
requestAnimationFrame(tick);

function buildTicker() {
  var items = [];
  var marketKey = MARKETS[marketIndex];

  for (var i = 0; i < GAMES.length; i++) {
    var g = GAMES[i];

    var item =
      g.away +
      " <span class='vs'>@</span> " +
      g.home +
      " <span class='odds'>" +
      g[marketKey] +
      "</span>";

    items.push(item);
  }

  var sep = "<img src='OSB+Logo_FullColor_OnDark.png";
  var legal = "<span class='compliance'>ODDS SUBJECT TO CHANGE. ELIGIBILITY RESTRICTIONS APPLY.</span>";
  var html = sep + items.join(sep) + sep + legal;

  track.innerHTML =
    "<span class='block'>" +
    html +
    "</span><span class='block'>" +
    html +
    "</span>";

  width = track.scrollWidth / 2;
  x = 0;
}

function tick(now) {
  var dt = (now - last) / 1000;
  last = now;

  x -= SPEED * dt;

  if (Math.abs(x) >= width) {
    marketIndex = (marketIndex + 1) % MARKETS.length;
    buildTicker();
  }

  track.style.transform = "translateX(" + x + "px)";
  requestAnimationFrame(tick);
}
</script>
</body>
</html>
