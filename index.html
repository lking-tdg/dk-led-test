<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>DraftKings NHL Moneyline Ticker</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 8000px;
    height: 80px;
    background: #000;
    overflow: hidden;
  }

  #canvas {
    width: 8000px;
    height: 80px;
    display: flex;
    align-items: center;
    overflow: hidden;
  }

  #track {
    display: inline-flex;
    align-items: center;
    white-space: nowrap;
    gap: 96px;
    font-family: Arial, sans-serif;
    will-change: transform;
  }

  .team-logo {
    height: 48px;
    margin: 0 10px;
    vertical-align: middle;
  }

  .vs {
    color: #ffffff;
    font-size: 48px;
    margin: 0 14px;
  }

  .odds {
    font-size: 64px;
    color: #00ff9c;
    margin-left: 24px;
  }

  .dk-separator {
    height: 34px;
    margin: 0 32px;
    vertical-align: middle;
  }

  .compliance {
    font-size: 42px;
    color: #ffffff;
    letter-spacing: 1.5px;
    margin-left: 32px;
  }
</style>
</head>

<body>
<div id="canvas">
  <div id="track"></div>
</div>

<script>
const SCROLL_SPEED = 120;
const track = document.getElementById("track");

/* Map team names → logo files */
const TEAM_LOGOS = {
  "EDM Oilers": "logos/EDM.png",
  "ANA Ducks": "logos/ANA.png",
  "NY Islanders": "logos/NYI.png",
  "FLA Panthers": "logos/FLA.png",
  "DAL Stars": "logos/DAL.png",
  "PIT Penguins": "logos/PIT.png",
  "BOS Bruins": "logos/BOS.png",
  "MIN Wild": "logos/MIN.png"
  // add others as needed
};

let x = 0;
let last = performance.now();
let contentWidth = 0;

fetch("NHL_DK_test.json")
  .then(res => res.json())
  .then(data => buildTicker(data));

function buildTicker(data) {
  const events = data.events.slice(0, 6); // limit for clarity
  const items = [];

  events.forEach(event => {
    const home = event.participants.find(p => p.venueRole === "Home");
    const away = event.participants.find(p => p.venueRole === "Away");

    // Find Moneyline market
    const market = data.markets.find(m =>
      m.eventId === event.id &&
      m.marketType.name === "Moneyline"
    );

    if (!market) return;

    const selections = data.selections.filter(s => s.marketId === market.id);

    const homeSel = selections.find(s => s.outcomeType === "Home");
    const awaySel = selections.find(s => s.outcomeType === "Away");

    if (!homeSel || !awaySel) return;

    items.push(`
      <img src="${TEAM_LOGOS[away.name] ||pan class="vs">@</span>
      <img src="${TEAM_LOGOS[home.name] || ""}" class="team-logo    ML: ${awaySel.displayOdds.american} / ${homeSel.displayOdds.american}
      </span>
    `);
  });

  const separator = `
    <img src="OSB_Linear_21+Logo_FullColor_OnDark.png"nst compliance = `
    <span class="compliance">
      ODDS SUBJECT TO CHANGE. ELIGIBILITY RESTRICTIONS APPLY.
    </span>
  `;

  const blockHTML = `
    ${separator}
    ${items.join(separator)}
    ${separator}
    ${compliance}
  `;

  track.innerHTML = `<span>${blockHTML}</span><span>${blockHTML}</span>`;

  requestAnimationFrame(() => {
    contentWidth = track.scrollWidth / 2;
  });

  requestAnimationFrame(animate);
}

function animate(now) {
  const dt = (now - last) / 1000;
  last = now;

  x -= SCROLL_SPEED * dt;
  if (Math.abs(x) >= contentWidth) x = 0;

  track.style.transform = `translateX(${x}px)`;
  requestAnimationFrame(animate);
}
</script>
</body>
</html>
